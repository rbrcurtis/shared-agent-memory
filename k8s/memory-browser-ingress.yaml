apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memory-browser-ingress
  namespace: qdrant
spec:
  ingressClassName: nginx
  rules:
    - host: ${MEMORY_BROWSER_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: memory-browser
                port:
                  number: 80
